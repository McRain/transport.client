<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebTransport Тест — Default Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117; color: #e0e0e0; padding: 24px;
    }
    h1 { margin-bottom: 16px; font-size: 1.5rem; color: #fff; }
    .controls {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      margin-bottom: 16px; padding: 16px; background: #1a1d27; border-radius: 8px;
    }
    .controls label { font-size: 0.85rem; color: #aaa; }
    .controls input {
      background: #272a36; border: 1px solid #3a3d4a; border-radius: 4px;
      color: #fff; padding: 6px 10px; font-size: 0.9rem; width: 280px;
    }
    .controls input.small { width: 80px; }
    button {
      padding: 8px 18px; border: none; border-radius: 6px; font-size: 0.9rem;
      cursor: pointer; font-weight: 600; transition: opacity .15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-connect { background: #3b82f6; color: #fff; }
    .btn-disconnect { background: #ef4444; color: #fff; }
    #status {
      padding: 10px 16px; margin-bottom: 16px; border-radius: 6px;
      background: #1a1d27; font-weight: 600; font-size: 1rem;
    }
    .metrics {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px; margin-bottom: 16px;
    }
    .metric {
      background: #1a1d27; border-radius: 8px; padding: 14px;
    }
    .metric .label { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
    .metric .value { font-size: 1.4rem; font-weight: 700; color: #3b82f6; }
    #log {
      background: #1a1d27; border-radius: 8px; padding: 12px;
      max-height: 300px; overflow-y: auto; font-family: 'Consolas', monospace;
      font-size: 0.82rem; line-height: 1.6;
    }
    #log .entry { border-bottom: 1px solid #272a36; padding: 2px 0; }
    #log .time { color: #666; }
  </style>
</head>
<body>

<h1>WebTransport Тест — Default Room</h1>

<div class="controls">v2
  <div>
    <label>Сервер:</label><br>
    <input id="serverUrl" value="https://transport.reneos.com:4433">
  </div>
  <div>
    <label>Размер чанка (байт):</label><br>
    <input id="chunkSize" class="small" type="number" value="4096" min="64" max="1048576">
  </div>
  <div>
    <label>Интервал (мс):</label><br>
    <input id="intervalMs" class="small" type="number" value="100" min="10" max="5000">
  </div>
  <div>
    <button id="connectBtn" class="btn-connect" onclick="startTest()">Подключиться</button>
    <button id="disconnectBtn" class="btn-disconnect" onclick="stopTest()" disabled>Отключиться</button>
  </div>
</div>

<div id="status">Не подключено</div>

<div class="metrics">
  <div class="metric"><div class="label">Время</div><div class="value"><span id="mTime">—</span></div></div>
  <div class="metric"><div class="label">Отправлено</div><div class="value"><span id="mSent">0 B</span></div></div>
  <div class="metric"><div class="label">Получено</div><div class="value"><span id="mRecv">0 B</span></div></div>
  <div class="metric"><div class="label">Скорость отправки</div><div class="value"><span id="mSendSpeed">0 B/с</span></div></div>
  <div class="metric"><div class="label">Скорость получения</div><div class="value"><span id="mRecvSpeed">0 B/с</span></div></div>
</div>

<div id="log"></div>

<script>
// ─── Протокол ───
const MSG_KEEPALIVE    = 0x00
const MSG_JOIN_DEFAULT = 0x07
const MSG_CALL_CREATED = 0x06
const MSG_CALL_READY   = 0x03
const MSG_PEER_LEFT    = 0x04
const MSG_ERROR        = 0x05
const MEDIA_VIDEO      = 0x10

// ─── Состояние ───
let transport = null
let datagramWriter = null
let keepAliveTimer = null
let metricsTimer = null
let startTime = null
let bytesSent = 0
let bytesReceived = 0
let mediaWriter = null
let maxDatagramSize = null
let sendErrorCount = 0

function logSendError(err) {
  sendErrorCount += 1
  if (sendErrorCount <= 5) {
    logMsg('<span style="color:#f66">Send error: ' + ((err && err.message) || err) + '</span>')
  }
}

function trySendDatagram(data) {
  if (!datagramWriter) return false

  if (maxDatagramSize && data.byteLength > maxDatagramSize) {
    logSendError(`datagram ${data.byteLength} B exceeds maxDatagramSize ${maxDatagramSize} B`)
    return false
  }

  const desiredSize = datagramWriter.desiredSize
  if (desiredSize !== null && desiredSize <= 0) {
    return false
  }

  datagramWriter.write(data).catch((err) => {
    logSendError(err)
  })
  return true
}

// ─── UI helpers ───
function logMsg(msg) {
  const el = document.getElementById('log')
  const d = document.createElement('div')
  d.className = 'entry'
  const t = new Date().toLocaleTimeString()
  d.innerHTML = `<span class="time">${t}</span> ${msg}`
  el.prepend(d)
}

function setStatus(text) {
  document.getElementById('status').textContent = text
}

function formatBytes(b) {
  if (b < 1024) return b + ' B'
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB'
  if (b < 1024 * 1024 * 1024) return (b / (1024 * 1024)).toFixed(1) + ' MB'
  return (b / (1024 * 1024 * 1024)).toFixed(2) + ' GB'
}

function updateMetrics() {
  if (!startTime) return
  const elapsed = (Date.now() - startTime) / 1000
  document.getElementById('mTime').textContent = elapsed.toFixed(1) + ' сек'
  document.getElementById('mSent').textContent = formatBytes(bytesSent)
  document.getElementById('mRecv').textContent = formatBytes(bytesReceived)
  document.getElementById('mSendSpeed').textContent =
    elapsed > 0 ? formatBytes(bytesSent / elapsed) + '/с' : '0 B/с'
  document.getElementById('mRecvSpeed').textContent =
    elapsed > 0 ? formatBytes(bytesReceived / elapsed) + '/с' : '0 B/с'
}

// ─── Подключение ───
async function startTest() {
  const url = document.getElementById('serverUrl').value.trim()
  if (!url) return

  setStatus('Подключение...')
  document.getElementById('connectBtn').disabled = true

  try {
    transport = new WebTransport(url)
    await transport.ready
    logMsg('Подключено к серверу')

    datagramWriter = transport.datagrams.writable.getWriter()
    maxDatagramSize = transport.datagrams.maxDatagramSize || null
    sendErrorCount = 0
    logMsg('maxDatagramSize: ' + (maxDatagramSize || 'n/a') + ' B')

    // Keep-alive каждые 3 секунды
    keepAliveTimer = setInterval(() => {
      trySendDatagram(new Uint8Array([MSG_KEEPALIVE]))
    }, 3_000)

    // Слушаем datagram-ы и входящие стримы
    listenDatagrams()
    listenIncomingStreams()

    // При закрытии соединения
    transport.closed.then(() => {
      logMsg('Соединение закрыто сервером')
      cleanup()
    }).catch(err => {
      logMsg('Разрыв соединения: ' + err.message)
      cleanup()
    })

    // Отправляем JoinDefault
    await datagramWriter.write(new Uint8Array([MSG_JOIN_DEFAULT]))
    logMsg('Запрос на вход в default room отправлен')
    setStatus('Ожидание второго участника...')

    document.getElementById('disconnectBtn').disabled = false
  } catch (err) {
    logMsg('Ошибка: ' + err.message)
    setStatus('Ошибка подключения')
    document.getElementById('connectBtn').disabled = false
  }
}

// ─── Datagram listener ───
async function listenDatagrams() {
  const reader = transport.datagrams.readable.getReader()
  try {
    while (true) {
      const { value, done } = await reader.read()
      if (done) break
      handleDatagram(value)
    }
  } catch { /* closed */ }
}

function handleDatagram(data) {
  if (!data || data.length === 0) return
  const type = data[0]
  const decoder = new TextDecoder()

  switch (type) {
    case MSG_CALL_CREATED: {
      const key = decoder.decode(data.slice(1, 13))
      logMsg('Комната создана, ключ: <b>' + key + '</b>')
      setStatus('Ожидание второго участника... Ключ: ' + key)
      break
    }
    case MSG_CALL_READY: {
      logMsg('<b>Оба участника подключены — старт обмена!</b>')
      setStatus('Активный обмен данными')
      startDataExchange()
      break
    }
    case MSG_PEER_LEFT: {
      logMsg('Второй участник отключился — завершаем')
      stopTest()
      break
    }
    case MSG_ERROR: {
      const msg = decoder.decode(data.slice(1))
      logMsg('Ошибка от сервера: ' + msg)
      setStatus('Ошибка: ' + msg)
      break
    }
  }
}

// ─── Incoming streams (получение данных) ───
async function listenIncomingStreams() {
  const reader = transport.incomingUnidirectionalStreams.getReader()
  try {
    while (true) {
      const { value: stream, done } = await reader.read()
      if (done) break
      readIncomingStream(stream)
    }
  } catch { /* closed */ }
}

async function readIncomingStream(stream) {
  const reader = stream.getReader()
  let leftover = new Uint8Array(0)

  try {
    while (true) {
      const { value, done } = await reader.read()
      if (done) break

      let data
      if (leftover.length > 0) {
        data = new Uint8Array(leftover.length + value.byteLength)
        data.set(leftover, 0)
        data.set(value, leftover.length)
      } else {
        data = value
      }

      let pos = 0
      while (pos + 5 <= data.length) {
        const view = new DataView(data.buffer, data.byteOffset + pos + 1, 4)
        const payloadLen = view.getUint32(0, false)

        if (pos + 5 + payloadLen > data.length) break

        bytesReceived += 5 + payloadLen
        pos += 5 + payloadLen
      }

      leftover = pos < data.length ? data.slice(pos) : new Uint8Array(0)
    }
  } catch { /* closed */ }
}

// ─── Отправка данных ───
let sending = false

async function startDataExchange() {
  startTime = Date.now()
  bytesSent = 0
  bytesReceived = 0

  metricsTimer = setInterval(updateMetrics, 500)

  const requestedChunkSize = Math.min(
  Math.max(parseInt(document.getElementById('chunkSize').value) || 4096, 64),
  1048576
  )
  const chunkSize = maxDatagramSize ? Math.min(requestedChunkSize, Math.max(64, maxDatagramSize - 1)) : requestedChunkSize
  const intervalMs = Math.min(
    Math.max(parseInt(document.getElementById('intervalMs').value) || 100, 10),
    5000
  )

  if (chunkSize !== requestedChunkSize) {
    logMsg(`Размер чанка уменьшен до ${formatBytes(chunkSize)} по maxDatagramSize`) 
  }

  logMsg(`Отправка: ${formatBytes(chunkSize)} каждые ${intervalMs} мс`)

  sending = true
  ;(async function sendLoop() {
    const payload = new Uint8Array(chunkSize)
    const header = new Uint8Array(5)
    header[0] = MEDIA_VIDEO
    new DataView(header.buffer).setUint32(1, chunkSize, false)

    while (sending) {
      try {
        crypto.getRandomValues(payload)
        await mediaWriter.write(header)
        await mediaWriter.write(payload)
        bytesSent += 5 + payload.byteLength
        if (intervalMs > 0) {
          await new Promise(r => setTimeout(r, intervalMs))
        }
      } catch {
        sending = false
      }
    }
  })()
}

// ─── Cleanup / disconnect ───
function cleanup() {
  if (keepAliveTimer) { clearInterval(keepAliveTimer); keepAliveTimer = null }
  sending = false
  if (metricsTimer)   { clearInterval(metricsTimer);   metricsTimer = null }
  updateMetrics()
  setStatus('Отключено')
  document.getElementById('connectBtn').disabled = false
  document.getElementById('disconnectBtn').disabled = true
}

async function stopTest() {
  sending = false
	maxDatagramSize = null

  try { if (mediaWriter)    { await mediaWriter.close();    mediaWriter = null } }
  catch { /* ignore */ }
  try { if (datagramWriter) { await datagramWriter.close(); datagramWriter = null } }
  catch { /* ignore */ }
  try { if (transport)      { transport.close();            transport = null } }
  catch { /* ignore */ }

  cleanup()
  logMsg('Тест завершён')
}

// Без авто-подключения — только по кнопке
</script>

</body>
</html>
